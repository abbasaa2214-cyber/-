<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1628" />
  <title>حاسبة الراتب التقاعدي</title>

  <!-- React + Babel (standalone, no build step needed) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; }
    body {
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    input, select, button { font-family: inherit; }
    input::placeholder { color: #5a7a9a; }
    #root { min-height: 100vh; }

    #loading-splash {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0a1628 0%, #1a2f4e 50%, #0d2137 100%);
      color: #e8c96d; font-family: 'Segoe UI', Tahoma, sans-serif; z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="loading-splash">
    <div style="font-size: 40px; margin-bottom: 12px;">💰</div>
    <div style="font-size: 14px; color: #8faabf;">جاري تحميل الحاسبة...</div>
  </div>

  <div id="root"></div>

  <script type="text/babel" data-presets="react" src="app.js"></script>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const interval = setInterval(() => {
        const root = document.getElementById("root");
        const splash = document.getElementById("loading-splash");
        if (root && root.children.length > 0 && splash) {
          splash.style.display = "none";
          clearInterval(interval);
        }
      }, 150);
    });
  </script>
</body>
</html>
